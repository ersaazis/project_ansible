version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    expose:
      - "5678"
    ports:
      - "5678:5678"
    env_file:
      - .env.n8n
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files
    restart: unless-stopped

volumes:
  n8n_data:
