- name: Install git
  apt:
    name: git
    state: present
    update_cache: yes

- name: Create project directory
  file:
    path: "{{ ansible_env.HOME }}/project_observability"
    state: directory
    mode: '0755'

- name: Clone Observability project repository
  git:
    repo: "https://github.com/ersaazis/project_observability"
    dest: "{{ ansible_env.HOME }}/project_observability"
    force: yes

- name: Template .env.grafana
  template:
    src: "{{ role_path }}/templates/.env.grafana.j2"
    dest: "{{ ansible_env.HOME }}/project_observability/.env.grafana"
    mode: '0600'

- name: Run Docker Compose
  command:
    cmd: "docker compose up -d"
    chdir: "{{ ansible_env.HOME }}/project_observability"
  register: compose_output
  changed_when: "'Running' in compose_output.stdout or 'Started' in compose_output.stdout"
