- name: Copy Nginx main configuration file
  copy:
    src: nginx.conf
    dest: /etc/nginx/nginx.conf
    mode: '0644'
    owner: root
    group: root
  notify: reload nginx

- name: Copy mime.types file
  copy:
    src: mime.types
    dest: /etc/nginx/mime.types
    mode: '0644'
    owner: root
    group: root
  notify: reload nginx
