- name: Extract SSH Keys from Vault
  hosts: all
  gather_facts: no
  tasks:
    - name: Extract SSH private key from Vault
      delegate_to: localhost
      copy:
        content: "{{ ansible_ssh_private_key_content }}"
        dest: "{{ ansible_ssh_private_key_file }}"
        mode: '0600'
      when: ansible_ssh_private_key_content is defined
