all:
  vars:
    ansible_user: root
    ansible_ssh_pass: "{{ lookup('env', 'ANSIBLE_SSH_PASS') }}"
    ansible_become_pass: "{{ lookup('env', 'ANSIBLE_BECOME_PASS') }}"
    # Alloy Configuration
    ALLOY_DATASOURCE_USER: "{{ lookup('env', 'ALLOY_DATASOURCE_USER') }}"
    ALLOY_DATASOURCE_PASSWORD: "{{ lookup('env', 'ALLOY_DATASOURCE_PASSWORD') }}"
    MIMIR_URL: "http://host.docker.internal/mimir/api/v1/push"
    LOKI_URL: "http://host.docker.internal/loki/api/v1/push"
    TEMPO_URL: "http://host.docker.internal/tempo"

  children:
    development:
      children:
        app_servers:
          hosts:
            node1:
              ansible_host: host.docker.internal
              ansible_port: 2222
        db_servers:
          hosts:
            node2:
              ansible_host: host.docker.internal
              ansible_port: 2223
